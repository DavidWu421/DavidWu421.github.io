    Publications:
      - title: Computing spectral shifts for Johannsen-Psaltis black holes
        authors:
          - David G. Wu
          - Asad Hussain
          - Aaron Zimmerman
        publisher: Physical Review D
        releaseDate: 2026-05-26
        url: https://journals.aps.org/prd/abstract/10.1103/3hm4-89xc
        summary: The growing number of gravitational wave (GW) detections and the increasing sensitivity of GW detectors have enabled precision tests of general relativity (GR) in the strong-field regime. The recent observation of multiple quasinormal modes (QNMs) in GW250114 marks a major advance for observational black hole spectroscopy. This clear signal, together with the growing number of GW detections, highlights the need for accurate predictions of QNM spectra in beyond-GR theories in order to carry out precision searches for new physics. In this work, we continue to lay the foundation for such predictions using a modified Teukolsky formalism in conjunction with the eigenvalue perturbation method. We compute the spectral shifts of slowly rotating Johannsen–Psaltis black holes for 2 ≤ℓ ≤10, all 𝑚, and overtones 𝑛=0,1,2, and confirm the large-ℓ behavior of the modes by comparing with the Wentzel-Kramers-Brillouin approximation. We find that these black holes admit definite-parity modes but break the isospectrality between even- and odd-parity QNMs at all spins, and that the shifts depend linearly on 𝑚 for slow spins. We further derive a general parity condition that any beyond-GR modification to the metric must satisfy in order to support definite-parity modes, providing new insights into isospectrality breaking and parity structure in gravitational perturbations.

      - title: Instructor interactions in traditional and nontraditional labs
        authors:
          - David G. Wu
          - Ashley B. Heim
          - Meagan Sundstrom
          - Cole Walsh
          - N. G. Holmes
        publisher: Physical Review Physics Education Research
        releaseDate: 2022-03-14
        url: https://journals.aps.org/prper/abstract/10.1103/PhysRevPhysEducRes.18.010121
        summary: As physics laboratory courses (labs) transition from traditional, model-verifying activities to discovery-based investigations, it becomes crucial to understand the role of the instructor in the implementation of various lab types. Prior work has started to address this need by examining either coarse-grained frequencies or fine-grained content of instructor interactions in labs. However, neither of these methods offer both a detailed and time-efficient procedure for measuring such interactions, which is required for comparisons across multiple sessions of several types of labs. Here we describe and present the results of a new approach to quantifying student-instructor interactions in labs by analyzing video recordings and drawing on techniques of social network analysis. Across five sections of three lab course offerings, we find that there is a higher total level of interaction between students and instructors in reformed discovery-based labs than in traditional labs. We find no clear pattern in the durations of student-initiated and instructor-initiated interactions across various instructors and lab types. The results suggest that the amount of interaction between instructors and students during lab is more a product of the instructional design than an individual instructor’s implementation of that design. This work is a preliminary step toward understanding the extent to which student-instructor interactions support the improved outcomes observed in discovery-based labs compared with traditional labs.

      - title: Examining the effects of lab instruction and gender composition on intergroup interaction networks in introductory physics labs
        authors:
          - Meagan Sundstrom
          - David G. Wu
          - Cole Walsh
          - Ashley B. Heim
          - N. G. Holmes
        publisher: Physical Review Physics Education Research
        releaseDate: 2022-01-04
        url: https://journals.aps.org/prper/abstract/10.1103/PhysRevPhysEducRes.18.010102
        summary: Understanding social interactions among students comprises a rich area of physics education research. Here we focus on the social interactions in introductory physics laboratories (labs). Most existing research in such contexts focuses on within-group social dynamics, however, we argue that interactions between different lab groups are just as valuable, especially in nontraditional (reformed) labs where students have more control over the experimental designs. Using video recordings of lab sessions and social network analysis methods, we examined whether and for how long groups interact with each other, comparing across three offerings of an introductory mechanics course. We observed significant variability in the interactions across lab sessions and no clear pattern in how strongly lab groups were connected in the networks between the different courses. More prolonged intergroup interactions, however, occurred in three of the four reformed lab sections, as compared to a traditional lab section and a reformed lab section that took place in the evening. We also developed a group-level social role classification scheme based on groups’ interaction patterns, identifying four roles: noninteractors, information seekers, responders, and mutual interactors. We found that groups in the traditional lab section disproportionately acted as noninteractors, indicating that many groups in this lab did not engage in intergroup interactions at all. In contrast, groups in reformed lab sections took on the remaining three roles more frequently. We also found possible relationships between the distributions of the social roles within each type of lab by the groups’ gender compositions. All-male groups took on interactive roles more often than all-female and mixed-gender groups in the reformed lab sections, but not in the traditional lab. Results indicate that the amount of time students spend on intergroup interactions may depend on the lab curriculum itself, the time of day of the section, and/or the student population of the section. Still, instructors can encourage collaboration between lab groups through direct prompts, but such prompts need to be repeated throughout the semester.

